<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BraveQR Scanner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="BraveQR Logo" class="logo">
      <h1>BraveQR</h1>
    </header>

    <div class="scanner-box" id="scanner-container">
      <video id="video-preview" autoplay playsinline></video>
      <div class="scanner-overlay">
        <div class="scanner-laser"></div>
      </div>
    </div>

    <div class="controls">
      <button id="start-lens" class="primary" style="background: linear-gradient(135deg, #ff5000, #ff9000);">
        <span>🔍</span> Lens Selection Scan
      </button>
      <button id="start-scan">
        <span>📸</span> Camera View
      </button>
      <button id="scan-page">
        <span>📄</span> Full Page Scan
      </button>
    </div>

    <div class="result-area">
      <div class="result-header">Result</div>
      <div id="scan-result">Waiting for QR code...</div>
    </div>
  </div>
  <script src="scripts/jsQR.js"></script>
  <script src="popup.js"></script>
</body>
</html>
