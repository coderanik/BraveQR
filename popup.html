<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BraveQR Scanner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="BraveQR Logo" class="logo">
      <h1>BraveQR</h1>
    </header>

    <div class="controls">
      <button id="scan-page">
        <span>📄</span> Scan Page for QR Codes
      </button>
    </div>

    <div class="result-area">
      <div class="result-header">Detected Codes</div>
      <div id="qr-list" class="qr-list">
        <div class="empty-state">Click the button above to start scanning this page.</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
